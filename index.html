<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مكتبة المؤلفات</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Tahoma, Arial, sans-serif;
    }

    body {
      background: #e9e4db;
      color: #3d2512;
    }

    header {
      background: linear-gradient(135deg, #6e451f, #8b5a2b);
      color: #fff;
      text-align: center;
      padding: 24px 15px;
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    header p {
      font-size: 18px;
    }

    .search-box {
      max-width: 700px;
      margin: 26px auto 20px;
      padding: 0 15px;
    }

    .search-box input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #b58345;
      border-radius: 18px;
      font-size: 18px;
      outline: none;
      background: #f8f5ef;
      color: #5a3818;
    }

    .container {
      max-width: 1220px;
      margin: auto;
      padding: 0 20px 40px;
    }

    .section-title {
      font-size: 28px;
      margin: 10px 0 20px;
      color: #5a3112;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
    }

    .category-card {
      background: #f8f3ea;
      border: 2px solid #d6b187;
      border-radius: 18px;
      padding: 24px 18px;
      text-align: center;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    }

    .category-card:hover {
      transform: translateY(-4px);
      border-color: #8b5a2b;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .category-card h3 {
      font-size: 23px;
      line-height: 1.7;
      color: #4a2b11;
      margin-bottom: 8px;
    }

    .category-card p {
      color: #7b644c;
      font-size: 15px;
    }

    .books-section {
      display: none;
    }

    .books-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .back-btn {
      background: #8b5a2b;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
    }

    .back-btn:hover {
      background: #6f451f;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .book-card {
      background: #fff;
      border: 1px solid #d8c2a4;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 5px 12px rgba(0,0,0,0.08);
      transition: 0.25s;
    }

    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }

    .book-cover {
      width: 100%;
      height: 290px;
      object-fit: cover;
      background: #ede3d5;
      display: block;
    }

    .book-info {
      padding: 16px;
      text-align: center;
    }

    .book-info h4 {
      font-size: 18px;
      color: #3f2814;
      line-height: 1.8;
      min-height: 68px;
      margin-bottom: 12px;
    }

    .book-info a {
      display: inline-block;
      text-decoration: none;
      background: #8b5a2b;
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 15px;
    }

    .book-info a:hover {
      background: #6f451f;
    }

    .empty-msg {
      background: #f7f2ea;
      border: 1px dashed #c9a16d;
      border-radius: 16px;
      padding: 25px;
      text-align: center;
      font-size: 22px;
      color: #7a5733;
    }

    footer {
      text-align: center;
      background: #6e451f;
      color: #fff;
      padding: 18px;
      font-size: 18px;
      margin-top: 40px;
    }

    @media (max-width: 700px) {
      header h1 {
        font-size: 28px;
      }

      .section-title {
        font-size: 24px;
      }

      .book-info h4 {
        min-height: auto;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>مكتبة المؤلفات</h1>
    <p>مكتبة إلكترونية خاصة بالمؤلفات والبحوث</p>
  </header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="ابحث عن قسم..." onkeyup="filterCategories()">
  </div>

  <div class="container">
    <section id="librarySection">
      <h2 class="section-title">أقسام المؤلفات</h2>
      <div class="categories" id="categoriesContainer"></div>
    </section>

    <section class="books-section" id="booksSection">
      <div class="books-header">
        <button class="back-btn" onclick="goBack()">رجوع إلى الأقسام</button>
        <h2 class="section-title" id="booksTitle"></h2>
      </div>
      <div id="booksContent"></div>
    </section>
  </div>

  <footer>
    جميع الحقوق محفوظة © مكتبة المؤلفات
  </footer>

  <script>
    const placeholderImage = "https://via.placeholder.com/300x420?text=%D8%BA%D9%84%D8%A7%D9%81+%D8%A7%D9%84%D9%83%D8%AA%D8%A7%D8%A8";

    const libraryData = [
      {
        name: "البحوث الفلسفية",
        description: "قسم خاص بالبحوث الفلسفية",
        books: [
          {
            title: "الإسلام ما بين الديمقراطية الرأسمالية والاشتراكية والشيوعية",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/download/27407/"
          },
          {
            title: "الإسلام ما بين الأفلاطونية والعقليين والنظرية الحسية والماركسية",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/download/49263/"
          }
        ]
      },
      {
        name: "البحوث الأصولية",
        description: "قسم خاص بالبحوث الأصولية",
        books: [
          {
            title: "الفكر المتين.. البراءة والتخيير – بحوث أصولية عالية – الجزء الأول",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/download/51859/"
          },
          {
            title: "الفكر المتين - المدخل الجزء الثالث – مبحث الأوامر",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/download/27423/"
          }
        ]
      },
      {
        name: "البحوث الفقهية",
        description: "قسم خاص بالبحوث الفقهية",
        books: [
          {
            title: "رسالة في نجاسة الخمر – بحث فقهي استدلالي",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          },
          {
            title: "الفصل في القول الفصل – بحث فقهي لتنمية الملكة عند الفقيه",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          },
          {
            title: "الفصل في الفريضة المعطلة – الجزء الأول",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          }
        ]
      },
      {
        name: "الرسالة العملية",
        description: "قسم خاص بالرسالة العملية",
        books: [
          {
            title: "المنهاج الواضح – كتاب الاجتهاد والتقليد – كتاب الطهارة",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          },
          {
            title: "المنهاج الواضح – كتاب الصلاة",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          }
        ]
      },
      {
        name: "بحوث المنطق وأصول الفقه",
        description: "قسم خاص ببحوث المنطق وأصول الفقه",
        books: [
          {
            title: "المنطق وأصول الفقه – الجزء الأول",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          }
        ]
      },
      {
        name: "البحوث الأخلاقية",
        description: "قسم خاص بالبحوث الأخلاقية",
        books: [
          {
            title: "معراج المؤمن",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          },
          {
            title: "روح الصلاة",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          }
        ]
      },
      {
        name: "بحوث التفسير",
        description: "قسم خاص ببحوث التفسير",
        books: [
          {
            title: "بحث حول تحريف القرآن",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          },
          {
            title: "النور والظلمات",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          }
        ]
      },
      {
        name: "البحوث العقائدية",
        description: "قسم خاص بالبحوث العقائدية",
        books: [
          {
            title: "تحطيم صنمية البخاري",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          },
          {
            title: "الدجال",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          }
        ]
      },
      {
        name: "البحوث التاريخية",
        description: "قسم خاص بالبحوث التاريخية",
        books: [
          {
            title: "وقفات مع توحيد ابن تيمية الجسمي الأسطوري – المحاضرة 1",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          },
          {
            title: "الدولة.. المارقة.. في عصر الظهور.. منذ عهد الرسول – الجزء الأول",
            image: placeholderImage,
            pdf: "https://www.al-hasany.org/writings/"
          }
        ]
      }
    ];

    const categoriesContainer = document.getElementById("categoriesContainer");
    const librarySection = document.getElementById("librarySection");
    const booksSection = document.getElementById("booksSection");
    const booksTitle = document.getElementById("booksTitle");
    const booksContent = document.getElementById("booksContent");
    const searchInput = document.getElementById("searchInput");

    function renderCategories(data) {
      categoriesContainer.innerHTML = "";

      if (data.length === 0) {
        categoriesContainer.innerHTML = `
          <div class="empty-msg">لا توجد نتائج مطابقة</div>
        `;
        return;
      }

      data.forEach(category => {
        const originalIndex = libraryData.findIndex(item => item.name === category.name);
        categoriesContainer.innerHTML += `
          <div class="category-card" onclick="openCategory(${originalIndex})">
            <h3>${category.name}</h3>
            <p>${category.description}</p>
          </div>
        `;
      });
    }

    function openCategory(index) {
      const category = libraryData[index];
      booksTitle.textContent = category.name;

      if (!category.books || category.books.length === 0) {
        booksContent.innerHTML = `
          <div class="empty-msg">لا توجد كتب مضافة حالياً داخل هذا القسم</div>
        `;
      } else {
        booksContent.innerHTML = `
          <div class="books-grid">
            ${category.books.map(book => `
              <div class="book-card">
                <img class="book-cover" src="${book.image || placeholderImage}" alt="${book.title}">
                <div class="book-info">
                  <h4>${book.title}</h4>
                  <a href="${book.pdf}" target="_blank">فتح الكتاب</a>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      }

      librarySection.style.display = "none";
      booksSection.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goBack() {
      booksSection.style.display = "none";
      librarySection.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function filterCategories() {
      const value = searchInput.value.trim();
      const filtered = libraryData.filter(category => category.name.includes(value));
      renderCategories(filtered);
    }

    renderCategories(libraryData);
  </script>

</body>
</html>
