<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مؤلفات الصرخي الحسني</title>

<style>
body {
    margin: 0;
    font-family: Tahoma;
    background: #111;
    color: white;
    direction: rtl;
}

/* الهيدر */
header {
    text-align: center;
    padding: 20px;
    background: linear-gradient(45deg, #1a1a1a, #333);
    font-size: 24px;
}

/* الأقسام */
.section {
    padding: 20px;
}

.section h2 {
    margin-bottom: 15px;
    color: #f5c16c;
}

/* الشبكة */
.books {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
}

/* الكرت */
.card {
    background: #1e1e1e;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.card:hover {
    transform: translateY(-10px);
}

/* الصورة */
.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

/* المعلومات */
.card-content {
    padding: 10px;
    text-align: center;
}

/* الاسم */
.card-title {
    font-size: 16px;
    margin-bottom: 10px;
}

/* زر */
.btn {
    display: inline-block;
    padding: 8px 12px;
    background: #f5c16c;
    color: black;
    text-decoration: none;
    border-radius: 5px;
    font-size: 14px;
}

.btn:hover {
    background: #ffdb9e;
}
</style>

</head>

<body>

<header>📚 مكتبة مؤلفات الصرخي الحسني</header>

<!-- قسم -->
<div class="section">
    <h2>قسم العقائد</h2>

    <div class="books">

        <div class="card">
            <img src="images/book1.jpg">
            <div class="card-content">
                <div class="card-title">اسم الكتاب</div>
                <a href="books/book1.pdf" target="_blank" class="btn">قراءة</a>
            </div>
        </div>

        <div class="card">
            <img src="images/book2.jpg">
            <div class="card-content">
                <div class="card-title">كتاب آخر</div>
                <a href="books/book2.pdf" target="_blank" class="btn">قراءة</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
