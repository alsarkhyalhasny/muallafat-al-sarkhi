<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مؤلفات الصرخي الحسني</title>

<style>
body {
    margin: 0;
    font-family: Tahoma;
    background: #f2eee9;
    direction: rtl;
    text-align: center;
}

header {
    background: #6b4226;
    color: white;
    padding: 15px;
    font-size: 22px;
}

.shelf {
    background: #8b5a2b;
    padding: 25px;
    margin: 25px;
    border-radius: 8px;
}

.books {
    display: flex;
    gap: 15px;
    overflow-x: auto;
}

.book {
    width: 200px;
    height: 300px;
    background: white;
    border-radius: 5px;
    box-shadow: 0 6px 10px rgba(0,0,0,0.4);
    flex-shrink: 0;
    transition: 0.3s;
}

.book:hover {
    transform: scale(1.05);
}

.book img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: white;
    border-radius: 5px;
}

.nav-btn {
    background: #6b4226;
    color: white;
    border: none;
    padding: 10px;
    margin: 10px;
    cursor: pointer;
}

.sidebar {
    width: 250px;
    float: left;
    padding: 20px;
    background: #e6d5c3;
    height: 100%;
}

.category {
    text-align: right;
    margin-bottom: 10px;
}

.category h3 {
    color: #6b4226;
}

.category ul {
    list-style: none;
    padding: 0;
}

.category li {
    padding: 5px 0;
}

.main {
    margin-left: 260px;
}
</style>

</head>

<body>

<header>📚 مكتبة مؤلفات الصرخي الحسني</header>

<div class="sidebar">
    <div class="category">
        <h3>المؤلفات</h3>
        <ul>
            <li>البحوث الفلسفية</li>
            <li>البحوث الأصولية</li>
            <li>البحوث الفقهية</li>
            <li>الرسالة العملية</li>
            <li>بحوث المنطق وأصول الفقه</li>
            <li>البحوث الأخلاقية</li>
            <li>بحوث التفسير</li>
            <li>البحوث العقائدية</li>
            <li>البحوث التاريخية</li>
            <li>المحاضرات</li>
            <li>البيانات والمواقف</li>
        </ul>
    </div>
</div>

<div class="main">

<div class="shelf">

    <button class="nav-btn" onclick="scrollBooks(-1)">⬅️</button>

    <div class="books" id="books">

        <a href="books/book1.pdf" target="_blank" class="book">
            <img src="images/book1.jpg">
        </a>

        <a href="books/book2.pdf" target="_blank" class="book">
            <img src="images/book2.jpg">
        </a>

    </div>

    <button class="nav-btn" onclick="scrollBooks(1)">➡️</button>

</div>

</div>

<script>
function scrollBooks(direction) {
    const container = document.getElementById("books");
    container.scrollBy({
        left: direction * 300,
        behavior: "smooth"
    });
}
</script>

</body>
</html>
