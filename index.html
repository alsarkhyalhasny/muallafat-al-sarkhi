<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مؤلفات الصرخي الحسني</title>

<style>
body {
    margin: 0;
    font-family: Tahoma;
    background: #f2eee9;
    direction: rtl;
    text-align: center;
}

/* العنوان */
header {
    background: #6b4226;
    color: white;
    padding: 15px;
    font-size: 22px;
}

/* الرف */
.shelf {
    background: #8b5a2b;
    padding: 25px;
    margin: 25px;
    border-radius: 8px;
}

/* الكتب */
.books {
    display: flex;
    gap: 15px;
    overflow-x: auto;
}

/* الكتاب */
.book {
    width: 200px;
    height: 300px;
    background: white;
    border-radius: 5px;
    box-shadow: 0 6px 10px rgba(0,0,0,0.4);
    flex-shrink: 0;
    transition: 0.3s;
}

/* عند المرور */
.book:hover {
    transform: scale(1.05);
}

/* الصورة */
.book img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* مهم حتى ما تنقص الصورة */
    background: white;
    border-radius: 5px;
}

/* الأزرار */
.nav-btn {
    background: #6b4226;
    color: white;
    border: none;
    padding: 10px;
    margin: 10px;
    cursor: pointer;
}
</style>

</head>

<body>

<header>📚 مكتبة مؤلفات الصرخي الحسني</header>

<div class="shelf">

    <button class="nav-btn" onclick="scrollBooks(-1)">⬅️</button>

    <div class="books" id="books">

        <a href="books/book1.pdf" target="_blank" class="book">
            <img src="images/book1.jpg">
        </a>

        <a href="books/book2.pdf" target="_blank" class="book">
            <img src="images/book2.jpg">
        </a>

    </div>

    <button class="nav-btn" onclick="scrollBooks(1)">➡️</button>

</div>

<script>
function scrollBooks(direction) {
    const container = document.getElementById("books");
    container.scrollBy({
        left: direction * 300,
        behavior: "smooth"
    });
}
</script>

</body>
</html>
