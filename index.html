<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مؤلفات الصرخي الحسني</title>

<style>
body {
    margin: 0;
    font-family: Tahoma;
    background: #e9e4dc;
    direction: rtl;
    text-align: center;
}

/* العنوان */
header {
    background: #4b2e1e;
    color: white;
    padding: 15px;
    font-size: 22px;
}

/* عنوان القسم */
h2 {
    margin-top: 30px;
    color: #4b2e1e;
}

/* الرف */
.shelf {
    position: relative;
    background: linear-gradient(#a47148, #5c3a21);
    padding: 30px 20px 40px;
    margin: 20px;
    border-radius: 10px;
    box-shadow: inset 0 -15px 25px rgba(0,0,0,0.5);
}

/* قاعدة الرف */
.shelf::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 15px;
    background: #3e2617;
    border-radius: 0 0 10px 10px;
}

/* الكتب */
.books {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding-bottom: 10px;
}

/* الكتاب */
.book {
    width: 200px;
    height: 300px;
    background: white;
    border-radius: 5px;
    box-shadow: 0 8px 12px rgba(0,0,0,0.5);
    transition: 0.3s;
    flex-shrink: 0;
    position: relative;
}

/* تأثير */
.book:hover {
    transform: translateY(-10px) scale(1.05);
}

/* صورة */
.book img {
    width: 100%;
    height: 100%;
    border-radius: 5px;
}

/* الفاصل بين الكتب */
.book::after {
    content: "";
    position: absolute;
    right: -8px;
    top: 0;
    width: 8px;
    height: 100%;
    background: #3e2617;
    border-radius: 2px;
}

/* أزرار */
.nav-btn {
    background: #4b2e1e;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 10px;
    cursor: pointer;
    border-radius: 5px;
}

.nav-btn:hover {
    background: #6a3f28;
}
</style>

</head>

<body>

<header>📚 مكتبة مؤلفات الصرخي الحسني</header>

<!-- قسم 1 -->
<h2>قسم العقائد</h2>

<div class="shelf">
    <button class="nav-btn" onclick="scrollBooks('a', -1)">⬅️</button>

    <div class="books" id="books-a">

        <a href="books/book1.pdf" target="_blank" class="book">
            <img src="images/book1.jpg">
        </a>

        <a href="books/book2.pdf" target="_blank" class="book">
            <img src="images/book2.jpg">
        </a>

    </div>

    <button class="nav-btn" onclick="scrollBooks('a', 1)">➡️</button>
</div>

<!-- قسم 2 -->
<h2>قسم الفقه</h2>

<div class="shelf">
    <button class="nav-btn" onclick="scrollBooks('b', -1)">⬅️</button>

    <div class="books" id="books-b">

        <a href="books/book3.pdf" target="_blank" class="book">
            <img src="images/book3.jpg">
        </a>

        <a href="books/book4.pdf" target="_blank" class="book">
            <img src="images/book4.jpg">
        </a>

    </div>

    <button class="nav-btn" onclick="scrollBooks('b', 1)">➡️</button>
</div>

<script>
function scrollBooks(id, direction) {
    const container = document.getElementById("books-" + id);
    container.scrollBy({
        left: direction * 300,
        behavior: "smooth"
    });
}
</script>

</body>
</html>
